[tasks.dmg-macos]
description = "Create a DMG from the Nix-built macOS app bundle."
run = "nix develop path:. --command bash scripts/macos/create-dmg.sh"

[tasks.dmg-macos-qt6]
description = "Create a DMG from the Nix-built Qt 6 macOS app bundle."
run = "nix develop path:.#qt6 --command bash -lc 'OPENTOONZ_APP=toonz/build/nix-qt6-relwithdebinfo/toonz/OpenToonz.app bash scripts/macos/create-dmg.sh'"

[tasks.release-qt6-experimental]
description = "Retag the current clean branch as qt-6-experimental and push it to refresh the rolling prerelease."
run = "bash scripts/qt6/release-experimental.sh"

[tasks.check]
description = "Run the flake configure check and whitespace validation."
run = "bash scripts/windows/check-msvc-abi.sh && bash scripts/qt6/check-multimedia-scope.sh && bash scripts/qt6/check-script-scope.sh && bash scripts/qt6/check-desktopwidget-scope.sh && bash scripts/qt6/check-checkbox-state-scope.sh && bash scripts/qt6/check-wheelevent-scope.sh && bash scripts/qt6/check-qaction-scope.sh && bash scripts/qt6/check-qimage-mirrored-scope.sh && bash scripts/qt6/check-qglformat-scope.sh && nix flake check path:. && git diff --check"

[tasks.format]
description = "Run the repository clang-format helper for changed C/C++ files."
run = "nix develop path:. --command bash -lc 'cd toonz/sources && ./beautification.sh'"
