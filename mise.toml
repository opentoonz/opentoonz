[env]
MISE_DISABLE_VERSION_CHECK = "1"
MISE_DISABLE_TOOLS = "1"

[tasks.dev]
description = "Enter the pinned Nix development shell."
run = "nix develop path:."

[tasks.dev-qt6]
description = "Enter the pinned Nix development shell for the Qt 6 migration lane."
run = "nix develop path:.#qt6"

[tasks.doctor]
description = "Print the key tool and dependency versions from the Nix shell."
run = "nix develop path:. --command bash -lc 'cmake --version && ninja --version && pkg-config --modversion Qt5Core libmypaint liblz4 libusb-1.0 libturbojpeg'"

[tasks.doctor-qt6]
description = "Print the key tool and dependency versions from the Qt 6 Nix shell."
run = "nix develop path:.#qt6 --command bash -lc 'cmake --version && ninja --version && pkg-config --modversion Qt6Core libmypaint liblz4 libusb-1.0 libturbojpeg'"

[tasks.check-textcodec]
description = "Compile and run the Qt 5 legacy text-codec adapter regression check."
run = "nix develop path:. --command bash scripts/qt6/check-textcodec.sh qt5"

[tasks.check-textcodec-qt6]
description = "Compile and run the Qt 6 legacy text-codec adapter regression check."
run = "nix develop path:.#qt6 --command bash scripts/qt6/check-textcodec.sh qt6"

[tasks.check-no-qregexp]
description = "Fail if removed Qt 5 QRegExp APIs reappear under toonz/sources."
run = "bash scripts/qt6/check-no-qregexp.sh"

[tasks.check-core5compat-scope]
description = "Fail if Core5Compat or direct QTextCodec usage escapes the documented adapter scope."
run = "bash scripts/qt6/check-core5compat-scope.sh"

[tasks.check-qt6-multimedia-scope]
description = "Fail if removed Qt 5 multimedia APIs escape the documented Qt 6 migration scope."
run = "bash scripts/qt6/check-multimedia-scope.sh"

[tasks.check-qt6-script-scope]
description = "Fail if legacy Qt Script bindings escape their Qt 5-only CMake scope."
run = "bash scripts/qt6/check-script-scope.sh"

[tasks.check-qt6-fontmetrics-scope]
description = "Fail if direct deprecated QFontMetrics::width() usage escapes QtCompat."
run = "bash scripts/qt6/check-fontmetrics-scope.sh"

[tasks.check-qt6-highdpi-attribute-scope]
description = "Fail if Qt 5 high-DPI startup attributes escape their Qt 5-only guards."
run = "bash scripts/qt6/check-highdpi-attribute-scope.sh"

[tasks.check-qt6-desktopwidget-scope]
description = "Fail if removed QDesktopWidget or QApplication::desktop APIs reappear."
run = "bash scripts/qt6/check-desktopwidget-scope.sh"

[tasks.check-qt6-combobox-activated-scope]
description = "Fail if deprecated QComboBox::activated() connects escape QtCompat."
run = "bash scripts/qt6/check-combobox-activated-scope.sh"

[tasks.check-qt6-checkbox-state-scope]
description = "Fail if direct QCheckBox::stateChanged connects escape QtCompat."
run = "bash scripts/qt6/check-checkbox-state-scope.sh"

[tasks.check-qt6-wheelevent-scope]
description = "Fail if direct QWheelEvent pixel-delta access escapes QtCompat."
run = "bash scripts/qt6/check-wheelevent-scope.sh"

[tasks.check-qt6-qaction-scope]
description = "Fail if deprecated QAction parentWidget usage reappears."
run = "bash scripts/qt6/check-qaction-scope.sh"

[tasks.check-qt6-qimage-mirrored-scope]
description = "Fail if deprecated QImage mirrored usage escapes QtCompat."
run = "bash scripts/qt6/check-qimage-mirrored-scope.sh"

[tasks.check-qt6-qglformat-scope]
description = "Fail if QGLFormat escapes the Qt 5-only OpenGL compatibility scope."
run = "bash scripts/qt6/check-qglformat-scope.sh"

[tasks.check-windows-msvc-abi]
description = "Fail on export/import annotations that are known to break MSVC Windows builds."
run = "bash scripts/windows/check-msvc-abi.sh"

[tasks.check-windows-msvc-abi-selftest]
description = "Self-test the Windows MSVC ABI guard against synthetic good and bad source snippets."
run = "bash scripts/windows/test-check-msvc-abi.sh"

[tasks.prepare-tiff]
description = "Build OpenToonz's vendored libtiff dependency."
run = "nix develop path:. --command bash scripts/nix/prepare-tiff.sh"

[tasks.configure]
description = "Configure the RelWithDebInfo Ninja build with the Nix dependency set."
run = "bash scripts/windows/check-msvc-abi.sh && bash scripts/qt6/check-no-qregexp.sh && bash scripts/qt6/check-core5compat-scope.sh && bash scripts/qt6/check-multimedia-scope.sh && bash scripts/qt6/check-script-scope.sh && bash scripts/qt6/check-fontmetrics-scope.sh && bash scripts/qt6/check-highdpi-attribute-scope.sh && bash scripts/qt6/check-desktopwidget-scope.sh && bash scripts/qt6/check-combobox-activated-scope.sh && bash scripts/qt6/check-checkbox-state-scope.sh && bash scripts/qt6/check-wheelevent-scope.sh && bash scripts/qt6/check-qaction-scope.sh && bash scripts/qt6/check-qimage-mirrored-scope.sh && bash scripts/qt6/check-qglformat-scope.sh && nix develop path:. --command bash -lc 'bash scripts/nix/prepare-tiff.sh && cmake -S toonz/sources --preset nix-relwithdebinfo'"

[tasks.configure-deprecated-api]
description = "Configure the Qt 5 lane with Qt APIs deprecated through 5.15 disabled."
run = "bash scripts/windows/check-msvc-abi.sh && bash scripts/qt6/check-no-qregexp.sh && bash scripts/qt6/check-core5compat-scope.sh && bash scripts/qt6/check-multimedia-scope.sh && bash scripts/qt6/check-script-scope.sh && bash scripts/qt6/check-fontmetrics-scope.sh && bash scripts/qt6/check-highdpi-attribute-scope.sh && bash scripts/qt6/check-desktopwidget-scope.sh && bash scripts/qt6/check-combobox-activated-scope.sh && bash scripts/qt6/check-checkbox-state-scope.sh && bash scripts/qt6/check-wheelevent-scope.sh && bash scripts/qt6/check-qaction-scope.sh && bash scripts/qt6/check-qimage-mirrored-scope.sh && bash scripts/qt6/check-qglformat-scope.sh && nix develop path:. --command bash -lc 'bash scripts/nix/prepare-tiff.sh && cmake -S toonz/sources --preset nix-deprecated-api'"

[tasks.configure-qt6]
description = "Configure the RelWithDebInfo Ninja build with the Qt 6 Nix dependency set."
run = "bash scripts/windows/check-msvc-abi.sh && bash scripts/qt6/check-no-qregexp.sh && bash scripts/qt6/check-core5compat-scope.sh && bash scripts/qt6/check-multimedia-scope.sh && bash scripts/qt6/check-script-scope.sh && bash scripts/qt6/check-fontmetrics-scope.sh && bash scripts/qt6/check-highdpi-attribute-scope.sh && bash scripts/qt6/check-desktopwidget-scope.sh && bash scripts/qt6/check-combobox-activated-scope.sh && bash scripts/qt6/check-checkbox-state-scope.sh && bash scripts/qt6/check-wheelevent-scope.sh && bash scripts/qt6/check-qaction-scope.sh && bash scripts/qt6/check-qimage-mirrored-scope.sh && bash scripts/qt6/check-qglformat-scope.sh && nix develop path:.#qt6 --command bash -lc 'bash scripts/nix/prepare-tiff.sh && cmake -S toonz/sources --preset nix-qt6-relwithdebinfo'"

[tasks.configure-qt6-translations]
description = "Configure an isolated Qt 6 build with translation target generation enabled."
run = "bash scripts/windows/check-msvc-abi.sh && bash scripts/qt6/check-no-qregexp.sh && bash scripts/qt6/check-core5compat-scope.sh && bash scripts/qt6/check-multimedia-scope.sh && bash scripts/qt6/check-script-scope.sh && bash scripts/qt6/check-fontmetrics-scope.sh && bash scripts/qt6/check-highdpi-attribute-scope.sh && bash scripts/qt6/check-desktopwidget-scope.sh && bash scripts/qt6/check-combobox-activated-scope.sh && bash scripts/qt6/check-checkbox-state-scope.sh && bash scripts/qt6/check-wheelevent-scope.sh && bash scripts/qt6/check-qaction-scope.sh && bash scripts/qt6/check-qimage-mirrored-scope.sh && bash scripts/qt6/check-qglformat-scope.sh && nix develop path:.#qt6 --command bash -lc 'bash scripts/nix/prepare-tiff.sh && cmake -S toonz/sources --preset nix-qt6-translation-check'"

[tasks.build-qt6-translations]
description = "Build the isolated Qt 6 translation lane and verify generated .qm files."
run = "bash scripts/windows/check-msvc-abi.sh && bash scripts/qt6/check-no-qregexp.sh && bash scripts/qt6/check-core5compat-scope.sh && bash scripts/qt6/check-multimedia-scope.sh && bash scripts/qt6/check-script-scope.sh && bash scripts/qt6/check-fontmetrics-scope.sh && bash scripts/qt6/check-highdpi-attribute-scope.sh && bash scripts/qt6/check-desktopwidget-scope.sh && bash scripts/qt6/check-combobox-activated-scope.sh && bash scripts/qt6/check-checkbox-state-scope.sh && bash scripts/qt6/check-wheelevent-scope.sh && bash scripts/qt6/check-qaction-scope.sh && bash scripts/qt6/check-qimage-mirrored-scope.sh && bash scripts/qt6/check-qglformat-scope.sh && nix develop path:.#qt6 --command bash -lc 'bash scripts/nix/prepare-tiff.sh && cmake -S toonz/sources --preset nix-qt6-translation-check && cmake --build toonz/build/nix-qt6-translation-check --target OpenToonz --parallel && count=$(find toonz/stuff/config/loc -mindepth 2 -maxdepth 2 -name \"*.qm\" | wc -l | tr -d \" \"); test \"$count\" = 63'"

[tasks.build]
description = "Configure and build OpenToonz with Ninja in toonz/build/nix-relwithdebinfo."
run = "bash scripts/windows/check-msvc-abi.sh && bash scripts/qt6/check-no-qregexp.sh && bash scripts/qt6/check-core5compat-scope.sh && bash scripts/qt6/check-multimedia-scope.sh && bash scripts/qt6/check-script-scope.sh && bash scripts/qt6/check-fontmetrics-scope.sh && bash scripts/qt6/check-highdpi-attribute-scope.sh && bash scripts/qt6/check-desktopwidget-scope.sh && bash scripts/qt6/check-combobox-activated-scope.sh && bash scripts/qt6/check-checkbox-state-scope.sh && bash scripts/qt6/check-wheelevent-scope.sh && bash scripts/qt6/check-qaction-scope.sh && bash scripts/qt6/check-qimage-mirrored-scope.sh && bash scripts/qt6/check-qglformat-scope.sh && nix develop path:. --command bash -lc 'bash scripts/nix/prepare-tiff.sh && cmake -S toonz/sources --preset nix-relwithdebinfo && cmake --build toonz/build/nix-relwithdebinfo --parallel'"

[tasks.build-qt6]
description = "Configure and build OpenToonz with Qt 6 in toonz/build/nix-qt6-relwithdebinfo."
run = "bash scripts/windows/check-msvc-abi.sh && bash scripts/qt6/check-no-qregexp.sh && bash scripts/qt6/check-core5compat-scope.sh && bash scripts/qt6/check-multimedia-scope.sh && bash scripts/qt6/check-script-scope.sh && bash scripts/qt6/check-fontmetrics-scope.sh && bash scripts/qt6/check-highdpi-attribute-scope.sh && bash scripts/qt6/check-desktopwidget-scope.sh && bash scripts/qt6/check-combobox-activated-scope.sh && bash scripts/qt6/check-checkbox-state-scope.sh && bash scripts/qt6/check-wheelevent-scope.sh && bash scripts/qt6/check-qaction-scope.sh && bash scripts/qt6/check-qimage-mirrored-scope.sh && bash scripts/qt6/check-qglformat-scope.sh && nix develop path:.#qt6 --command bash -lc 'bash scripts/nix/prepare-tiff.sh && cmake -S toonz/sources --preset nix-qt6-relwithdebinfo && cmake --build toonz/build/nix-qt6-relwithdebinfo --parallel'"

[tasks.run]
description = "Run the locally built OpenToonz binary or app bundle."
run = "nix develop path:. --command bash -lc 'if [ -d toonz/build/nix-relwithdebinfo/toonz/OpenToonz.app ]; then open toonz/build/nix-relwithdebinfo/toonz/OpenToonz.app; elif [ -x toonz/build/nix-relwithdebinfo/bin/opentoonz ]; then toonz/build/nix-relwithdebinfo/bin/opentoonz; else toonz/build/nix-relwithdebinfo/bin/OpenToonz; fi'"

[tasks.package-macos]
description = "Bundle the Nix-built macOS app with stuff data and Qt dependencies."
run = "nix develop path:. --command bash scripts/macos/package-nix-app.sh"

[tasks.package-macos-qt6]
description = "Bundle the Nix-built Qt 6 macOS app with stuff data and Qt dependencies."
run = "nix develop path:.#qt6 --command bash -lc 'OPENTOONZ_APP=toonz/build/nix-qt6-relwithdebinfo/toonz/OpenToonz.app bash scripts/macos/package-nix-app.sh'"

[tasks.check-macos-arm64]
description = "Verify the Nix-built macOS app bundle contains arm64-only Mach-O files."
run = "nix develop path:. --command bash scripts/macos/assert-arm64-bundle.sh"

[tasks.check-macos-arm64-qt6]
description = "Verify the Nix-built Qt 6 macOS app bundle contains arm64-only Mach-O files."
run = "nix develop path:.#qt6 --command bash -lc 'OPENTOONZ_APP=toonz/build/nix-qt6-relwithdebinfo/toonz/OpenToonz.app bash scripts/macos/assert-arm64-bundle.sh'"

[tasks.gui-smoke-qt6]
description = "Launch the packaged Qt 6 app with isolated runtime data and capture startup logs."
run = "bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-scene-create-qt6]
description = "Create a throwaway scene through the packaged Qt 6 Startup dialog."
run = "OPENTOONZ_GUI_SMOKE_ACTION=create-scene bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-highdpi-qt6]
description = "Capture packaged Qt 6 high-DPI screen and window state without exercising rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=high-dpi bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-script-console-view-qt6]
description = "Run packaged Qt 6 Script Console view(), warning, and expected-error helpers."
run = "OPENTOONZ_GUI_SMOKE_ACTION=script-console-view bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-media-devices-qt6]
description = "Enumerate packaged Qt 6 audio input/output and camera devices without capture or playback."
run = "OPENTOONZ_GUI_SMOKE_ACTION=media-devices bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-camera-formats-qt6]
description = "Enumerate packaged Qt 6 default camera formats without starting capture."
run = "OPENTOONZ_GUI_SMOKE_ACTION=camera-formats bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-audio-input-qt6]
description = "Start the packaged Qt 6 default audio input backend and capture a short buffer."
run = "OPENTOONZ_GUI_SMOKE_ACTION=audio-input bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-audio-recording-wav-qt6]
description = "Record a short packaged Qt 6 WAV through the Record Audio writer and reload it through sound I/O."
run = "OPENTOONZ_GUI_SMOKE_ACTION=audio-recording-wav bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-audio-playback-wav-qt6]
description = "Generate a packaged Qt 6 WAV, reload it through sound I/O, and start playback through the product audio device."
run = "OPENTOONZ_GUI_SMOKE_ACTION=audio-playback-wav bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-audio-output-qt6]
description = "Start the packaged Qt 6 default audio output backend with a short silent buffer."
run = "OPENTOONZ_GUI_SMOKE_ACTION=audio-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-xsheet-scrub-qt6]
description = "Create Qt 6 raster/vector xsheet cells and switch frame/column state in the packaged app."
run = "OPENTOONZ_GUI_SMOKE_ACTION=xsheet-scrub bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-render-qt6]
description = "Create a visible raster frame and verify Qt 6 SceneViewer framebuffer pixels in the packaged app."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-render bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-vector-render-qt6]
description = "Create a visible vector frame and verify Qt 6 SceneViewer framebuffer pixels in the packaged app."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-vector-render bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-preview-render-output-qt6]
description = "Render a raster scene through the Qt 6 Previewer cache path and verify preview pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=preview-render-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-fx-preview-render-output-qt6]
description = "Render a raster scene through the Qt 6 PreviewFxManager flipbook path and verify cached preview pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=fx-preview-render-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-fx-preview-subcamera-render-output-qt6]
description = "Render a raster scene through the Qt 6 PreviewFxManager sub-camera path and verify cropped cached preview pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=fx-preview-subcamera-render-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-fx-preview-flipbook-controls-qt6]
description = "Exercise Qt 6 FX Preview flipbook frame switching, clone, freeze, and unfreeze against two cached frames."
run = "OPENTOONZ_GUI_SMOKE_ACTION=fx-preview-flipbook-controls bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-fx-preview-save-previewed-frames-qt6]
description = "Save two Qt 6 FX Preview flipbook frames to PNG and verify the exported pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=fx-preview-save-previewed-frames bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-fx-preview-subcamera-save-previewed-frames-qt6]
description = "Save two cropped Qt 6 FX Preview sub-camera flipbook frames to PNG and verify the exported pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=fx-preview-subcamera-save-previewed-frames bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-final-render-output-qt6]
description = "Render a standard-DPI red raster scene through Qt 6 MovieRenderer and verify the PNG output pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=final-render-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-final-render-background-output-qt6]
description = "Render a partial red raster scene over an opaque blue background through Qt 6 MovieRenderer and verify PNG output pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=final-render-background-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-final-render-sequence-output-qt6]
description = "Render a two-frame red/green raster scene through Qt 6 MovieRenderer and verify PNG sequence output pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=final-render-sequence-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-final-render-composite-output-qt6]
description = "Render two raster columns through Qt 6 MovieRenderer and verify red/green composite PNG output pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=final-render-composite-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-final-render-vector-output-qt6]
description = "Render a red vector scene through Qt 6 MovieRenderer and verify PNG output pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=final-render-vector-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-final-render-toonz-raster-output-qt6]
description = "Render a color-mapped Toonz Raster scene through Qt 6 MovieRenderer and verify PNG output pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=final-render-toonz-raster-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-final-render-fx-output-qt6]
description = "Render a blurred raster FX scene through Qt 6 MovieRenderer and verify PNG output pixels."
run = "OPENTOONZ_GUI_SMOKE_ACTION=final-render-fx-output bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-zoom-pan-qt6]
description = "Zoom and pan a visible raster frame and verify Qt 6 SceneViewer framebuffer/high-DPI behavior."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-zoom-pan bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-onion-skin-qt6]
description = "Enable onion skin on a visible raster frame and verify Qt 6 SceneViewer framebuffer/high-DPI behavior."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-onion-skin bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-onion-skin-rowarea-qt6]
description = "Replay xsheet row-area onion marker UI events and verify Qt 6 viewer/row-area rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-onion-skin-rowarea bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-onion-skin-rowarea-drag-qt6]
description = "Replay xsheet row-area onion marker drag ranges and verify Qt 6 viewer/row-area rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-onion-skin-rowarea-drag bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-onion-skin-fixed-marker-drag-qt6]
description = "Replay xsheet row-area fixed onion marker range drags and verify Qt 6 viewer/row-area rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-onion-skin-fixed-marker-drag bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-onion-skin-shift-trace-qt6]
description = "Replay xsheet row-area Shift and Trace ghost marker clicks and verify Qt 6 viewer/row-area rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-onion-skin-shift-trace bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-onion-skin-context-menu-qt6]
description = "Trigger onion-skin context menu commands and verify Qt 6 viewer/row-area rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-onion-skin-context-menu bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-onion-skin-custom-colors-qt6]
description = "Apply custom onion colors and verify Qt 6 viewer/row-area rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-onion-skin-custom-colors bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-onion-skin-orientations-qt6]
description = "Flip xsheet timeline orientation and verify Qt 6 onion row-area rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-onion-skin-orientations bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-camera-overlay-qt6]
description = "Toggle the camera box overlay and verify Qt 6 SceneViewer framebuffer/high-DPI behavior."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-camera-overlay bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-safe-area-field-guide-qt6]
description = "Toggle safe-area and field-guide overlays and verify Qt 6 SceneViewer framebuffer/high-DPI behavior."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-safe-area-field-guide bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-safe-area-presets-qt6]
description = "Switch safe-area presets and verify Qt 6 SceneViewer custom-color rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-safe-area-presets bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-safe-area-custom-file-qt6]
description = "Load a user-authored safearea.ini and verify Qt 6 SceneViewer custom-color rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-safe-area-custom-file bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-field-guide-settings-qt6]
description = "Apply custom field-guide size/aspect settings and verify Qt 6 SceneViewer rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-field-guide-settings bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-ruler-guide-qt6]
description = "Toggle ruler guide overlays and verify Qt 6 SceneViewer framebuffer/high-DPI behavior."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-ruler-guide bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-ruler-guide-events-qt6]
description = "Replay ruler guide create, move, and delete through Qt 6 Ruler mouse events."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-ruler-guide-events bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-ruler-guide-variants-qt6]
description = "Replay ruler guide drag-hide variants through Qt 6 Ruler mouse events."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-ruler-guide-variants bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-ruler-guide-lines-qt6]
description = "Verify custom ruler guide line positions and dashed viewer guide rendering in Qt 6."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-ruler-guide-lines bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-ruler-guide-styles-qt6]
description = "Apply custom QSS ruler guide styles and verify Qt 6 Ruler widget rendering."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-ruler-guide-styles bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-ruler-ticks-qt6]
description = "Capture ruler tick rendering through Qt 6 Ruler widgets after viewer transform changes."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-ruler-ticks bash scripts/qt6/run-gui-smoke.sh"

[tasks.gui-smoke-viewer-animate-tool-overlay-qt6]
description = "Toggle the Animate tool overlay and verify Qt 6 SceneViewer framebuffer/high-DPI behavior."
run = "OPENTOONZ_GUI_SMOKE_ACTION=viewer-animate-tool-overlay bash scripts/qt6/run-gui-smoke.sh"

