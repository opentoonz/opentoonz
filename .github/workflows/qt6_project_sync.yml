name: Qt 6 Project Sync

on:
  workflow_run:
    workflows:
      - Linux Build
      - MacOS Build
      - Windows Build
      - Qt 6 Experimental Binary Builds
    types:
      - requested
      - in_progress
      - completed
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for the manual sync
        required: false
        type: string
  push:
    branches:
      - master
    paths:
      - .github/qt6-validation/**
      - .github/workflows/qt6_project_sync.yml
      - scripts/qt6/sync-github-project.mjs
  schedule:
    - cron: '37 */6 * * *'

permissions:
  actions: read
  contents: read

jobs:
  sync:
    name: Sync validation project
    if: >-
      github.repository == 'bgyss/opentoonz' &&
      (
        github.event_name != 'workflow_run' ||
        github.event.workflow_run.head_branch == 'codex/qt-6-port' ||
        github.event.workflow_run.name == 'Qt 6 Experimental Binary Builds'
      )
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Sync GitHub Project
        env:
          QT6_PROJECT_TOKEN: ${{ secrets.QT6_PROJECT_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          if [ -n "${QT6_PROJECT_TOKEN:-}" ]; then
            export GH_PROJECT_TOKEN="$QT6_PROJECT_TOKEN"
          else
            export GH_PROJECT_TOKEN="$GITHUB_TOKEN_FALLBACK"
          fi

          node scripts/qt6/sync-github-project.mjs
