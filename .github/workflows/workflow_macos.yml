name: MacOS Build

on:
  push:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_macos.yml'
  pull_request:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_macos.yml'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  macOS:
    name: Apple Silicon arm64
    timeout-minutes: 180
    runs-on: macos-15
    env:
      OPENTOONZ_APP: toonz/build/nix-relwithdebinfo/toonz/OpenToonz.app
      OPENTOONZ_DMG: toonz/build/nix-relwithdebinfo/toonz/OpenToonz.dmg
      OPENTOONZ_REQUIRED_ARCH: arm64
      OPENTOONZ_ALLOW_UNIVERSAL: '0'
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      MACOS_DEVELOPER_ID_APPLICATION: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
      MACOS_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.MACOS_NOTARY_KEYCHAIN_PROFILE }}
      MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
      MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
      MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: false

      - name: Confirm Apple Silicon runner
        run: |
          uname -a
          test "$(uname -m)" = "arm64"

      - name: Trust mise configuration
        run: mise trust --yes ./mise.toml

      - name: Check pinned toolchain
        run: mise run doctor

      - name: Build OpenToonz
        run: mise run build

      - name: Bundle app
        run: mise run package-macos

      - name: Verify arm64 bundle
        run: mise run check-macos-arm64

      - name: Import Apple signing certificate
        if: ${{ github.event_name == 'release' && env.MACOS_CERTIFICATE_P12_BASE64 != '' && env.MACOS_CERTIFICATE_PASSWORD != '' }}
        run: |
          keychain_password="${MACOS_KEYCHAIN_PASSWORD:-temporary-ci-keychain-password}"
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/opentoonz-signing.keychain-db"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

      - name: Sign app for release
        if: ${{ github.event_name == 'release' }}
        run: scripts/macos/sign-notarize.sh

      - name: Create DMG
        run: mise run dmg-macos

      - name: Sign and notarize DMG for release
        if: ${{ github.event_name == 'release' }}
        run: scripts/macos/sign-notarize.sh

      - uses: actions/upload-artifact@v6
        with:
          name: OpenToonz-macos-arm64-${{ github.sha }}
          path: toonz/build/nix-relwithdebinfo/toonz/OpenToonz.dmg
